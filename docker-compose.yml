services:
  db:
    image: postgres:18
    container_name: finpulse-db
    environment:
      POSTGRES_DB: finpulse
      POSTGRES_USER: finpulse_db
      POSTGRES_PASSWORD: finpulse_db_password
    ports:
      - "5432:5432"
    volumes:
      - finpulse_pgdata:/var/lib/postgresql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/10_schema.sql:ro
      - ./database/finpulse_seed.sql:/docker-entrypoint-initdb.d/20_seed.sql:ro
      - ./database/read_only_user.sql:/docker-entrypoint-initdb.d/30_read_only_user.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finpulse_db -d finpulse"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: finpulse-backend
    # Load secrets (e.g. GEMINI_API_KEY) from .env; values in the environment:
    # block below still take precedence where listed.
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://finpulse_ai_app:change_this_app_password@db:5432/finpulse}
      ANALYTICS_API_TOKEN: ${ANALYTICS_API_TOKEN:-change_this_analytics_api_token}
      SQL_AGENT_PROVIDER: ${SQL_AGENT_PROVIDER:-template}
      TEMPLATE_VECTOR_STORE: ${TEMPLATE_VECTOR_STORE:-chroma}
      CHROMA_PATH: ${CHROMA_PATH:-/app/chromadb}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-gemini}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
      GEMINI_EMBEDDING_DIMENSIONS: ${GEMINI_EMBEDDING_DIMENSIONS:-768}
      QUERY_NORMALIZER_PROVIDER: ${QUERY_NORMALIZER_PROVIDER:-gemini}
      QUERY_NORMALIZER_MODEL: ${QUERY_NORMALIZER_MODEL:-gemini-2.5-flash-lite}
      QUERY_NORMALIZER_ENABLED: ${QUERY_NORMALIZER_ENABLED:-true}
      SQL_GENERATION_MODEL_FAST: ${SQL_GENERATION_MODEL_FAST:-gemini-2.5-flash}
      SQL_GENERATION_MODEL_STRONG: ${SQL_GENERATION_MODEL_STRONG:-gemini-2.5-pro}
      CLARIFICATION_ENABLED: ${CLARIFICATION_ENABLED:-true}
      CLARIFICATION_MODEL: ${CLARIFICATION_MODEL:-gemini-2.5-flash}
      TEMPLATE_MATCH_THRESHOLD: ${TEMPLATE_MATCH_THRESHOLD:-0.75}
      CORS_ORIGINS: ${CORS_ORIGINS:-'["http://localhost:3000"]'}
      DEMO_LIMIT_ENABLED: ${DEMO_LIMIT_ENABLED:-true}
      DEMO_CALL_LIMIT: ${DEMO_CALL_LIMIT:-5}
      DEMO_WINDOW_SECONDS: ${DEMO_WINDOW_SECONDS:-86400}
    volumes:
      - finpulse_chromadb:/app/chromadb
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: finpulse-frontend
    environment:
      BACKEND_API_BASE_URL: ${BACKEND_API_BASE_URL:-http://backend:8000}
      ANALYTICS_API_TOKEN: ${ANALYTICS_API_TOKEN:-change_this_analytics_api_token}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  finpulse_pgdata:
  finpulse_chromadb:
