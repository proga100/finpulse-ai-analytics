# FinPulse — nginx reverse proxy for finpulse.flance.info
#
# The browser talks ONLY to the Next.js frontend (127.0.0.1:3012); the frontend
# proxies to the backend over the docker network. Backend (8012) and Postgres
# are not publicly exposed. The chat endpoint streams Server-Sent Events, so
# buffering MUST be off on /api/.
#
# Install:
#   sudo cp deploy/nginx/finpulse.flance.info.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/finpulse.flance.info.conf /etc/nginx/sites-enabled/
#   sudo certbot certonly --webroot -w /var/www/certbot -d finpulse.flance.info
#   sudo nginx -t && sudo systemctl reload nginx

map $http_upgrade $fp_connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP -> HTTPS (and ACME challenge)
server {
    listen 80;
    listen [::]:80;
    server_name finpulse.flance.info;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name finpulse.flance.info;

    # Per-host cert (or swap for the *.flance.info wildcard if you have one).
    ssl_certificate     /etc/letsencrypt/live/finpulse.flance.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/finpulse.flance.info/privkey.pem;
    # ssl_certificate     /etc/letsencrypt/live/flance.info/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/flance.info/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 2m;

    # Streaming chat API (SSE) — no buffering, long read timeout.
    location /api/analytics-chat {
        proxy_pass http://127.0.0.1:3012;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Everything else -> Next.js frontend.
    location / {
        proxy_pass http://127.0.0.1:3012;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $fp_connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend liveness probe (bound to localhost on the host).
    location = /health {
        proxy_pass http://127.0.0.1:8012/health;
        proxy_set_header Host $host;
    }
}
